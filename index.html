<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XTREME Pet Therapist</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    @font-face {
      font-family: 'Sofia Sans';
      src: url('fonts/SofiaSans-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
    }

    @font-face {
      font-family: 'Sofia Sans';
      src: url('fonts/SofiaSans-Italic-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: italic;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sofia Sans', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: transparent;
      transition: background-color 1.5s ease-in-out;
      overflow-x: hidden;
    }

    body.fish-mode {
      background-color: #0085A1;
    }

    /* Main Section */
    .hero {
      flex: 1;
      background-color: #E52428;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      overflow: hidden;
      transition: background-color 1.5s ease-in-out;
    }

    .hero.fish-mode {
      background-color: #0085A1;
    }


    /* Grainy texture overlay */
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("images/Xtreme Pets Texture.png");
      background-size: cover;
      background-position: center;
      pointer-events: none;
    }

    /* Logo */
    .logo {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .logo img,
    .logo video {
      height: 5vw;
      min-height: 50px;
      max-height: 100px;
      width: auto;
    }

    .top-discord {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 10;
      padding: 14px 20px;
      font-family: 'Sofia Sans', sans-serif;
      font-size: 14px;
      font-weight: 900;
      border: none;
      border-radius: 50px;
      background: #f5f5f0;
      color: #1a1a1a;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }

    .top-discord:hover {
      background: #fff;
    }

    /* Main content area */
    .content {
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      width: 100%;
      position: relative;
      z-index: 1;
      padding: 1vw 5vw 1vw 12vw;
      gap: 0;
    }

    /* Title area */
    .title-area {
      text-align: center;
      width: 40%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .title-logo {
      width: 100%;
      height: auto;
    }

    /* Main robot character */
    .robot-main {
      position: relative;
      width: 60%;
      display: flex;
      justify-content: flex-start;
      align-items: center;
    }

    .robot-main img {
      width: 95%;
      height: auto;
      transition: opacity 1.5s ease-in-out;
      opacity: 1;
    }

    .robot-main img:first-child {
      position: relative;
    }

    .robot-main img:last-child {
      position: absolute;
      top: 0;
      left: 0;
    }

    .robot-main img.hidden {
      opacity: 0;
    }

    /* CTA Section */
    .cta {
      text-align: center;
      position: relative;
      z-index: 1;
      padding-bottom: 50px;
      margin-top: -5vw;
    }

    .cta h2 {
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .signup-form {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .signup-form a.discord-btn {
      padding: 16px 36px;
      font-family: 'Sofia Sans', sans-serif;
      font-size: 20px;
      font-weight: 900;
      border: none;
      border-radius: 50px;
      background: #f5f5f0;
      color: #1a1a1a;
      text-decoration: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }

    .signup-form a.discord-btn:hover {
      background: #fff;
    }

    /* Footer */
    footer {
      width: 100%;
      padding: 18px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    footer .footer-video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 0;
    }

    footer::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #05C1F0;
      mix-blend-mode: soft-light;
      z-index: 1;
    }

    footer > * {
      position: relative;
      z-index: 2;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .footer-logo {
      height: 60px;
      width: auto;
    }

    .footer-gif {
      width: 50px;
      height: auto;
    }

    .footer-tagline {
      font-size: 1.4rem;
      color: #1a1a1a;
    }

    .footer-tagline strong {
      font-weight: 800;
    }

    .footer-tagline em {
      font-style: italic;
      font-weight: 400;
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .footer-right a {
      display: flex;
    }

    .social-icon {
      height: 28px;
      width: auto;
    }

    /* Helio character */
    .helio {
      position: absolute;
      left: -5vw;
      top: 5vh;
      z-index: 9999;
      pointer-events: none;
    }

    .helio img {
      height: 35vh;
      width: auto;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .content {
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2vw;
      }

      .title-area {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-bottom: 30px;
        margin-top: 20px;
      }

      .title-logo {
        width: 60%;
      }

      .robot-main {
        width: 100%;
        display: flex;
        justify-content: center;
        position: relative;
        min-height: 80vw;
        margin-bottom: 40px;
      }

      .robot-main img,
      .robot-main img:first-child,
      .robot-main img:last-child {
        width: 100% !important;
        height: auto !important;
        position: absolute !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
      }

      .robot-main img.hidden {
        opacity: 0;
      }

      /* Hide top-left logo and discord button on mobile */
      .logo,
      .top-discord {
        display: none;
      }

      /* Helio adjustments for tablet */
      .helio {
        left: -12vw;
        top: 0;
      }

      .helio img {
        height: 25vh;
      }

      /* Footer adjustments for mobile */
      footer {
        flex-direction: row;
        align-items: center;
        padding: 14px 10px !important;
        margin: 0 !important;
        gap: 5px;
        min-height: auto;
        background-size: 100% 100%;
      }

      .footer-left {
        flex: 1;
        gap: 5px;
        padding: 0;
        margin: 0;
      }

      .footer-logo {
        display: block;
        height: 90px;
        width: auto;
        padding: 0;
        margin: 0;
      }

      .footer-tagline {
        text-align: left;
        font-size: 1rem;
        line-height: 1.2;
        max-width: 180px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-left: 20px;
      }

      .footer-right {
        gap: 24px;
        padding: 0 20px;
        margin: 0;
      }

      .social-icon {
        height: 20px;
        padding: 0;
        margin: 0;
      }
    }

    @media (max-width: 500px) {
      .helio {
        left: -28vw;
      }

      .signup-form {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .signup-form a.discord-btn {
        border-radius: 50px;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="helio">
      <img src="images/Helio Idle Alpha Red 02.gif" alt="Helio">
    </div>
    <div class="logo">
      <a href="https://www.companypicnic.com/" target="_blank" rel="noopener noreferrer">
        <video autoplay muted loop playsinline>
          <source src="images/CoPicnic_EyeBlink_V1.mp4" type="video/mp4">
        </video>
      </a>
    </div>

    <a href="https://discord.gg/AzHrkT6s" class="top-discord" target="_blank" rel="noopener noreferrer">
      <svg width="20" height="15" viewBox="0 0 71 55" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A37.4 37.4 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 4.9a.2.2 0 00-.1.1C1.5 18.7-.9 32.2.3 45.5v.2a58.9 58.9 0 0017.7 9 .2.2 0 00.3-.1 42.1 42.1 0 003.6-5.9.2.2 0 00-.1-.3 38.8 38.8 0 01-5.5-2.6.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 42 42 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .4 36.4 36.4 0 01-5.5 2.6.2.2 0 00-.1.3 47.2 47.2 0 003.6 5.9.2.2 0 00.3.1A58.7 58.7 0 0070.5 45.7v-.2c1.4-15-2.3-28.4-9.8-40.1a.2.2 0 00-.1-.1h-.5zM23.7 37.3c-3.5 0-6.3-3.2-6.3-7.1s2.8-7.1 6.3-7.1 6.4 3.2 6.3 7.1c0 3.9-2.8 7.1-6.3 7.1zm23.3 0c-3.5 0-6.3-3.2-6.3-7.1s2.8-7.1 6.3-7.1 6.4 3.2 6.3 7.1c0 3.9-2.7 7.1-6.3 7.1z" fill="#1a1a1a"/></svg>
      Join our Discord
    </a>

    <div class="content">
      <div class="title-area">
        <img src="images/logo.svg" alt="XTREME Pet Therapist" class="title-logo">
      </div>

      <div class="robot-main">
        <img src="images/cat.png" alt="Cat Mech Robot" id="pet-cat">
        <img src="images/fish.png" alt="Fish Mech Robot" id="pet-fish" class="hidden">
      </div>
    </div>

    <div class="cta">
      <h2>Get Early Access</h2>
      <div class="signup-form">
        <a href="https://discord.gg/AzHrkT6s" class="discord-btn" target="_blank" rel="noopener noreferrer">
          <svg width="26" height="20" viewBox="0 0 71 55" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A37.4 37.4 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 4.9a.2.2 0 00-.1.1C1.5 18.7-.9 32.2.3 45.5v.2a58.9 58.9 0 0017.7 9 .2.2 0 00.3-.1 42.1 42.1 0 003.6-5.9.2.2 0 00-.1-.3 38.8 38.8 0 01-5.5-2.6.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 42 42 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .4 36.4 36.4 0 01-5.5 2.6.2.2 0 00-.1.3 47.2 47.2 0 003.6 5.9.2.2 0 00.3.1A58.7 58.7 0 0070.5 45.7v-.2c1.4-15-2.3-28.4-9.8-40.1a.2.2 0 00-.1-.1h-.5zM23.7 37.3c-3.5 0-6.3-3.2-6.3-7.1s2.8-7.1 6.3-7.1 6.4 3.2 6.3 7.1c0 3.9-2.8 7.1-6.3 7.1zm23.3 0c-3.5 0-6.3-3.2-6.3-7.1s2.8-7.1 6.3-7.1 6.4 3.2 6.3 7.1c0 3.9-2.7 7.1-6.3 7.1z" fill="#1a1a1a"/></svg>
          Join our Discord
        </a>
      </div>
    </div>
  </main>

  <footer>
    <video class="footer-video" autoplay muted loop playsinline>
      <source src="images/footer-bg.mp4" type="video/mp4">
    </video>
    <div class="footer-left">
      <p class="footer-tagline"><strong>The Company That Makes</strong> <em>Good Company</em></p>
    </div>
    <div class="footer-right">
      <a href="https://x.com/xtremepets" aria-label="X" target="_blank" rel="noopener noreferrer">
        <img src="images/cp-x.svg" alt="X" class="social-icon">
      </a>
      <a href="https://www.instagram.com/xtremepets?igsh=NTc4MTIwNjQ2YQ==" aria-label="Instagram" target="_blank" rel="noopener noreferrer">
        <img src="images/cp-instagram.svg" alt="Instagram" class="social-icon">
      </a>
    </div>
  </footer>

  <script>
    const hero = document.querySelector('.hero');
    const body = document.body;
    const catImg = document.getElementById('pet-cat');
    const fishImg = document.getElementById('pet-fish');
    let showingCat = true;

    setInterval(() => {
      if (showingCat) {
        catImg.classList.add('hidden');
        fishImg.classList.remove('hidden');
        hero.classList.add('fish-mode');
        body.classList.add('fish-mode');
      } else {
        fishImg.classList.add('hidden');
        catImg.classList.remove('hidden');
        hero.classList.remove('fish-mode');
        body.classList.remove('fish-mode');
      }
      showingCat = !showingCat;
    }, 8000);

  </script>
</body>
</html>
